# Base Configuration for Horovod Distributed Training

# Model Configuration
model:
  type: "custom"  # Options: custom, distilgpt2, gpt2
  d_model: 512
  n_heads: 8
  n_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 512
  vocab_size: 50257  # GPT-2 tokenizer vocab size

# Training Configuration
training:
  epochs: 3
  per_gpu_batch_size: 8
  learning_rate: 5.0e-4
  warmup_steps: 500
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 100
  save_interval: 1000
  eval_interval: 500

# Data Configuration
data:
  dataset_name: "lucadiliello/bookcorpusopen"
  dataset_split: "train"
  max_samples: null  # null for all, or int for subset
  validation_split: 0.05
  num_workers: 4
  shuffle: true

# Generation Configuration
generation:
  max_new_tokens: 100
  temperature: 0.8
  top_k: 50
  top_p: 0.9
  num_samples: 5

# Paths
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  tensorboard_dir: "runs"

# Misc
seed: 42
fp16: false  # Set to true for mixed precision training

