# Configuration for DistilGPT-2 (Fine-tuning)

# Model Configuration
model:
  type: "distilgpt2"  # Uses pretrained DistilGPT-2
  pretrained_name: "distilgpt2"

# Training Configuration
training:
  epochs: 3
  per_gpu_batch_size: 8
  learning_rate: 3.0e-5
  warmup_steps: 500
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 100
  save_interval: 2000
  eval_interval: 1000

# Data Configuration
data:
  dataset_name: "lucadiliello/bookcorpusopen"
  dataset_split: "train"
  max_samples: null
  validation_split: 0.05
  num_workers: 4
  shuffle: true

# Generation Configuration
generation:
  max_new_tokens: 150
  temperature: 0.85
  top_k: 50
  top_p: 0.92
  num_samples: 5

# Paths
paths:
  checkpoint_dir: "checkpoints/distilgpt2"
  log_dir: "logs"
  tensorboard_dir: "runs/distilgpt2"

# Misc
seed: 42
fp16: true

