# H100-Optimized Configuration for Zaratan HPC Cluster
# Optimized for NVIDIA H100 GPUs (80GB VRAM, Tensor Cores, high bandwidth)

# Model Configuration
model:
  type: "custom"  # Options: custom, distilgpt2, gpt2
  d_model: 768    # Increased for H100 capacity
  n_heads: 12
  n_layers: 12
  d_ff: 3072
  dropout: 0.1
  max_seq_len: 512
  vocab_size: 50257  # GPT-2 tokenizer vocab size

# Training Configuration (H100-optimized)
training:
  epochs: 10
  per_gpu_batch_size: 16        # H100 can handle larger batches (80GB VRAM)
  learning_rate: 3.0e-4          # Slightly lower for larger batches
  warmup_steps: 1000
  weight_decay: 0.01
  gradient_accumulation_steps: 2 # Effective batch size: 16 * 4 GPUs * 2 = 128
  max_grad_norm: 1.0
  log_interval: 50               # More frequent logging
  save_interval: 500
  eval_interval: 250
  scale_lr_by_world_size: false  # If true, multiply LR by number of GPUs
  amp_dtype: "bf16"              # Prefer BF16 on H100 (fast + stable)
  gradient_checkpointing: false  # Enable if you need larger seq/batch

# Data Configuration
data:
  dataset_name: "lucadiliello/bookcorpusopen"
  dataset_split: "train"
  max_samples: null  # null for all, or int for subset
  validation_split: 0.05
  num_workers: 8                 # More workers for H100 (faster data loading)
  shuffle: true
  pack_to_max_length: true       # Enable token packing for H100 efficiency

# Generation Configuration
generation:
  max_new_tokens: 100
  temperature: 0.8
  top_k: 50
  top_p: 0.9
  num_samples: 5

# Paths
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  tensorboard_dir: "runs"

# Misc
seed: 42
fp16: false  # Legacy (use training.amp_dtype: bf16)

# Distributed options (optional)
distributed:
  horovod_compression: "none"  # Options: none, fp16
