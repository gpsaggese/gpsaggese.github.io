# Configuration for Zaratan H100 GPUs (msml610 allocation)
# Optimized for 4x H100 (80GB VRAM each)

# Hardware Target
hardware:
  target: "zaratan-h100"
  gpus_per_node: 4
  gpu_type: "H100"
  gpu_memory_gb: 80

# Model Configuration
model:
  type: "custom"
  d_model: 768
  n_heads: 12
  n_layers: 8
  d_ff: 3072
  dropout: 0.1
  max_seq_len: 512
  vocab_size: 50257

# Training Configuration
training:
  epochs: 5
  per_gpu_batch_size: 12    # Leverage 80GB VRAM
  learning_rate: 3.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  log_interval: 100
  save_interval: 2000
  eval_interval: 1000

# Data Configuration
data:
  dataset_name: "lucadiliello/bookcorpusopen"
  dataset_split: "train"
  max_samples: null           # Use full dataset
  validation_split: 0.05
  num_workers: 4
  shuffle: true

# Generation Configuration
generation:
  max_new_tokens: 200
  temperature: 0.85
  top_k: 50
  top_p: 0.95
  num_samples: 5

# Paths (Zaratan-specific)
paths:
  checkpoint_dir: "/scratch/zt1/project/msml610/vikranth/checkpoints/h100"
  log_dir: "/scratch/zt1/project/msml610/vikranth/logs/h100"
  tensorboard_dir: "/scratch/zt1/project/msml610/vikranth/runs/h100"

# Distributed Configuration
distributed:
  backend: "nccl"
  use_horovod: true

# Misc
seed: 42
fp16: true    # Mixed precision for faster training

